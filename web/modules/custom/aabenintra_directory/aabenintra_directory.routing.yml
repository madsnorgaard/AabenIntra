aabenintra_directory.directory:
  path: '/directory'
  defaults:
    _controller: '\Drupal\aabenintra_directory\Controller\DirectoryController::page'
    _title: 'People'
  requirements:
    _permission: 'access content'

aabenintra_directory.expertise:
  path: '/experts'
  defaults:
    _controller: '\Drupal\aabenintra_directory\Controller\ExpertiseController::page'
    _title: 'Find an expert'
  requirements:
    _permission: 'access content'

aabenintra_directory.org_chart:
  path: '/org-chart'
  defaults:
    _controller: '\Drupal\aabenintra_directory\Controller\OrgChartController::page'
    _title: 'Organisation chart'
  requirements:
    _permission: 'access content'
